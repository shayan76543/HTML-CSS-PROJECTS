<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up form</title>
    <link rel="stylesheet" href="sign_in_form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="form">
        <div class="registration">
            <h1>Registration Form</h1>
        </div>
        <div class="first_name user">
            <i class="fa-solid fa-user-tie"></i>
            <input type="text" placeholder="First Name">
        </div>
        <div class="last_name user">
            <i class="fa-solid fa-user-tie"></i>
            <input type="text" placeholder="Last Name">
        </div>
        <div class="email user">
            <i class="fa-solid fa-envelope-open"></i>
            <input type="email" placeholder="Entere Your Email">
        </div>
        <div class="password user">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Entere Password">
        </div>
        <div class="select_option user">
            <select>
                <option>Peshawar</option>
                <option>Islamabad</option>
                <option>Karachi</option>
                <option>Lahore</option>
                <option>Queta</option>
                <option>united Punjab</option>
                <option>Pindi</option>
            </select>
        </div>
        <div class="radio_button ">
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>
        <div class="check_box">
            <input type="checkbox"> I Agree with term and condition
        </div>
        <div class="register_button user">
            <input type="button" value="Register">
        </div>
    </div>

</body>

</html>
