<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Page</title>
    <link rel="stylesheet" href="form2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="form">
        <div class="registration">
            <h1>Registration</h1>
        </div>
        <div class="first_Name user">
            <i class="fa-regular fa-user"></i>
            <input type="text" placeholder="Entere your Name">

        </div>
        <div class="last_name user">
            <i class="fa-regular fa-user"></i>
            <input type="text" placeholder="Entere your Last Name">
        </div>
        <div class="emal user">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" placeholder="Entere your Email">
        </div>
        <div class="password user">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Entere your Password"> 
        </div>
        <div class="select_country user">
            <select>
                <option>Peshawar</option>
                <option>islamabad</option>
                <option>Quetta</option>
                <option>Karachi</option>
                <option>pindi</option>
                <option>Lahore</option>
                <option>Multan</option>
            </select>
        </div>
        <div class="radio_box">
            <input type="radio" name="gender">
            <label>Male</label>
            <input type="radio" name="gender">
            <label>Female</label>
        </div>
        <div class="check_box">
            <input type="checkbox">
            <label>I agree with term and condition</label>
        </div>
        <div class="registration_button">
            <input type="button" value="Registration">
        </div>
    </div>

</body>

</html>
