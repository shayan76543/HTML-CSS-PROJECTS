<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <header>
        <div class="tag">
            Responsive Form
        </div>
    </header>
    <main>
        <section class="form">
            <div class="content">
                <div class="name_tag">
                    <h1>Job Application (web)</h1>
                </div>
                <div class="username">
                    <div class="first_name">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" placeholder="First Name">
                    </div>
                    <div class="last_name">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" placeholder="Last Name">
                    </div>
                </div>
                <div class="email_job">
                    <div class="email">
                        <label for="email">Email</label>
                        <input type="text" id="email" placeholder=" Entere Email">
                    </div>
                    <div class="job_role">
                        <label for="job_option">Job Role</label>
                        <select id="job_option">
                            <option>Frontened</option>
                            <option>Backened</option>
                            <option>Full Stack</option>
                            <option>AI + Backened</option>
                        </select>
                    </div>
                </div>
                <div class="address_bar">
                    <label for="addressbar">Address Bar</label>
                    <input type="text" id="addressbar">
                </div>
                <div class="city-pincode">
                    <div class="city">
                        <label for="city">City</label>
                        <input type="text" id="city" placeholder="Entere City">
                    </div>
                    <div class="pincode">
                        <label for="pincode">Pincode</label>
                        <input type="text" id="pincode" placeholder="Entere pincode">
                    </div>
                </div>
                <div class="start-doc">
                    <div class="start_date">
                        <label for="date">Start-Date</label>
                        <input type="date" id="date">
                    </div>
                    <div class="upload_cv">
                        <label for="file">Upload CV</label>
                        <input type="file" id="file" placeholder="Drage your file">
                    </div>
                </div>
                <div class="button">
                    <button>Apply Now</button>
                </div>
                


        </section>
    </main>
</body>

</html>
